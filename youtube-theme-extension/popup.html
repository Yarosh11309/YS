<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #333;
    }

    h3 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    label input[type="radio"] {
      margin-right: 6px;
    }

    select,
    input[type="color"],
    input[type="file"] {
      width: 100%;
      margin-top: 4px;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      background: #fafafa;
    }

    button {
      width: 100%;
      padding: 10px 0;
      margin-top: 12px;
      background: linear-gradient(90deg, #ff4e45, #d90429);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: linear-gradient(90deg, #e33b35, #b40320);
    }

    a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="mainPage">
    <h3>YouTube Theme</h3>
    <div>
      <label><input type="radio" name="bgMode" value="color" checked> Use color</label>
      <label><input type="radio" name="bgMode" value="image"> Use custom image</label>
    </div>
    <label id="colorRow">Background Color: <input type="color" id="bgColor"></label>
    <label id="imageRow" style="display:none">Custom Background Image: <input type="file" id="bgImage" accept="image/*"></label>
    <label>Font Style:
      <select id="fontStyle">
        <option value="">Default</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
        <option value="Impact">Impact</option>
        <option value="Lucida Console">Lucida Console</option>
        <option value="Trebuchet MS">Trebuchet MS</option>
        <option value="Brush Script MT">Brush Script MT</option>
      </select>
    </label>
    <label>Font Color:
      <select id="fontColor">
        <option value="">Default</option>
        <option value="#FFFFFF">White</option>
        <option value="#000000">Black</option>
      </select>
    </label>
    <label>Pre-made Theme:
      <select id="themeSelect">
        <option value="">None</option>
      </select>
    </label>
    <button id="save">Save</button>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button id="youThemeBtn">You Theme</button>
      <button id="storeBtn">Theme store</button>
    </div>
  </div>

  <div id="storePage" style="display:none">
    <button class="backBtn">&#8592; Back</button>
    <h3>Theme Store</h3>
    <div id="thumbnails" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    <div id="themeDetails" style="display:none"></div>
  </div>

  <div id="youThemePage" style="display:none">
    <button class="backBtn">&#8592; Back</button>
    <h3>Admin Themes</h3>
    <div id="themesContainer"></div>
    <h4>Add New Theme</h4>
    <label>Name: <input type="text" id="themeName"></label>
    <label>Background Color: <input type="color" id="themeBgColor" value="#ffffff"></label>
    <label>Background Image: <input type="file" id="themeBgImage" accept="image/*"></label>
    <label>Font Style:
      <select id="themeFontStyle">
        <option value="">Default</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
        <option value="Impact">Impact</option>
        <option value="Lucida Console">Lucida Console</option>
        <option value="Trebuchet MS">Trebuchet MS</option>
        <option value="Brush Script MT">Brush Script MT</option>
      </select>
    </label>
    <label>Font Color:
      <select id="themeFontColor">
        <option value="">Default</option>
        <option value="#FFFFFF">White</option>
        <option value="#000000">Black</option>
      </select>
    </label>
    <button id="addTheme">Add Theme</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
