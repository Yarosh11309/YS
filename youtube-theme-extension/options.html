<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #ffffff;
      color: #333;
      max-width: 500px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 12px;
      font-size: 14px;
    }

    input[type="text"],
    select,
    input[type="color"] {
      padding: 6px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      background: #fafafa;
    }

    button {
      margin-top: 12px;
      padding: 8px 16px;
      background: linear-gradient(90deg, #ff4e45, #d90429);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: linear-gradient(90deg, #e33b35, #b40320);
    }
  </style>
</head>
<body>
  <h2>Extension Options</h2>
  <div id="themesContainer"></div>
  <h3>Add New Theme</h3>
  <label>Name: <input type="text" id="themeName"></label>
  <label>Background Color: <input type="color" id="themeBgColor" value="#ffffff"></label>
  <label>Font Style:
    <select id="themeFontStyle">
      <option value="">Default</option>
      <option value="Arial">Arial</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="Impact">Impact</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Brush Script MT">Brush Script MT</option>
    </select>
  </label>
  <label>Font Color:
    <select id="themeFontColor">
      <option value="">Default</option>
      <option value="#FFFFFF">White</option>
      <option value="#000000">Black</option>
    </select>
  </label>
  <button id="addTheme">Add Theme</button>
  <script src="options.js"></script>
</body>
</html>
